[build-system]
requires = ["flit_core>=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "microsoft-kiota-http"
version = "1.11.1"
description = "Core abstractions for kiota generated libraries in Python"
authors = [{name = "Microsoft", email = "graphtooling+python@microsoft.com"}]
license = {text = "MIT"}
readme = "README.md"
keywords = ["kiota", "openAPI", "Microsoft", "Graph"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: MIT License",
]
requires-python = ">=3.10"
dependencies = [
    "microsoft-kiota-abstractions>=1.11.1,<2.0.0",
    "opentelemetry-api>=1.27.0",
    "opentelemetry-sdk>=1.27.0",
    "httpx[http2]>=0.25,<1.0.0",
]

[project.urls]
Homepage = "https://github.com/microsoft/kiota#readme"
Repository = "https://github.com/microsoft/kiota-python"
Documentation = "https://learn.microsoft.com/openapi/kiota/"

[tool.flit.module]
name = "kiota_http"

[tool.mypy]
warn_unused_configs = true
files = "kiota_http"

[tool.yapf]
based_on_style = "pep8"
dedent_closing_brackets = true
each_dict_entry_on_separate_line = true
column_limit = 100

[tool.isort]
profile = "hug"